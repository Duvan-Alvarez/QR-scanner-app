services:
  web:
    build: .
    image: qr-scanner-app:latest
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: ${NEXT_TELEMETRY_DISABLED:-1}
      DATABASE_PATH: ${DATABASE_PATH:-/app/data/database.sqlite}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-admin123}
      DEFAULT_SCANNER_USERNAME: ${DEFAULT_SCANNER_USERNAME:-scanner}
      DEFAULT_SCANNER_PASSWORD: ${DEFAULT_SCANNER_PASSWORD:-scanner123}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/api/stats').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
