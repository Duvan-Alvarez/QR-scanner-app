version: '3.8'
services:
  web:
    build: .
    image: qr-scanner-app:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_PATH=/app/data/database.sqlite
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/_next/static/" ]
      interval: 30s
      timeout: 10s
      retries: 3
